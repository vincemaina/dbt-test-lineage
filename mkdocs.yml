site_name: dbt-test-lineage
site_description: Propagate dbt test guarantees through column lineage to find redundant, missing, and contradicted tests.
docs_dir: docs

exclude_docs: |
  CLAUDE.md

validation:
  links:
    not_found: ignore

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - scheme: slate
      toggle: { icon: material/brightness-4, name: Switch to light mode }

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_if_no_docstring: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            docstring_section_style: list
            filters: ["!^_"]

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Use cases: use-cases.md
  - API reference: reference/

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
